name: Bug report
description: Report a reproducible MicroPC defect
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Security vulnerabilities must be reported privately according to SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest command sequence that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include MicroPC, Node.js, SmolVM, operating-system, connector, and agent versions where relevant.
      placeholder: |
        MicroPC:
        Node.js:
        SmolVM:
        OS:
        Connector:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Remove credentials and private repository information before posting.
      render: text
